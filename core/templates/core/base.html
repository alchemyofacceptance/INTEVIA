<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}INTEVIA{% endblock %}</title>
  <style>
    :root {
      --ink: #18201e;
      --muted: #5d6864;
      --paper: #f4f2ec;
      --surface: #fffef9;
      --line: #c8cec9;
      --accent: #087c6b;
      --accent-dark: #075b50;
      --warning: #a04724;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(135deg, #eef2ed 0%, var(--paper) 55%, #ece8de 100%);
      color: var(--ink);
      font-family: "Aptos", "Trebuchet MS", sans-serif;
      min-height: 100vh;
      letter-spacing: 0;
    }
    header {
      background: var(--ink);
      color: white;
      border-bottom: 4px solid var(--accent);
    }
    nav, main { width: min(1040px, calc(100% - 32px)); margin: 0 auto; }
    nav { min-height: 64px; display: flex; align-items: center; gap: 24px; }
    nav strong { font-family: Georgia, serif; font-size: 1.25rem; margin-right: auto; }
    nav a, nav button { color: white; }
    nav form { margin: 0; }
    main { padding: 48px 0 72px; }
    h1, h2 { font-family: Georgia, serif; font-weight: 500; }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 12px; }
    h2 { font-size: 1.35rem; }
    a { color: var(--accent-dark); }
    button, .command {
      border: 0;
      background: var(--accent);
      color: white;
      min-height: 42px;
      padding: 10px 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:hover, .command:hover { background: var(--accent-dark); }
    .lede { color: var(--muted); max-width: 66ch; font-size: 1.1rem; }
    .panel { background: var(--surface); border-left: 4px solid var(--accent); padding: 24px; margin: 28px 0; }
    .event-list { display: grid; gap: 12px; margin-top: 28px; }
    .event-item { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 20px; }
    .meta { color: var(--muted); font-size: .9rem; }
    .warning { border-color: var(--warning); }
    .warning h1 { color: var(--warning); }
    label { display: block; font-weight: 700; margin-bottom: 6px; }
    input { width: 100%; min-height: 44px; border: 1px solid #89938e; background: white; padding: 9px 11px; font: inherit; }
    .field { margin-bottom: 18px; }
    .errors { color: #8d2d1d; }
    @media (max-width: 620px) {
      nav { gap: 12px; }
      main { padding-top: 32px; }
      h1 { font-size: 2.25rem; }
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="Primary navigation">
      <strong>INTEVIA</strong>
      {% if request.user.is_authenticated and request.intevia_identity.access_state == "active" %}
        <a href="{% url 'shell' %}">Home</a>
        <a href="{% url 'event-list' %}">Events</a>
      {% endif %}
      {% if request.user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">Log out</button>
        </form>
      {% endif %}
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
